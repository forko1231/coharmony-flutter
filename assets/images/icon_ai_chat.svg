<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="aiGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
  </defs>
  <!-- Chat bubble -->
  <rect x="8" y="12" width="48" height="32" rx="8" fill="url(#aiGrad)" opacity="0.2"/>
  <rect x="10" y="14" width="44" height="28" rx="6" fill="none" stroke="url(#aiGrad)" stroke-width="2"/>
  <!-- Sparkle stars -->
  <circle cx="22" cy="24" r="2.5" fill="#3B82F6"/>
  <circle cx="32" cy="24" r="2.5" fill="#6366F1"/>
  <circle cx="42" cy="24" r="2.5" fill="#8B5CF6"/>
  <!-- Sparkle rays on center dot -->
  <line x1="32" y1="19" x2="32" y2="17" stroke="#6366F1" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="36" y1="21" x2="38" y2="19" stroke="#6366F1" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="28" y1="21" x2="26" y2="19" stroke="#6366F1" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Chat tail -->
  <polygon points="18,42 24,42 20,50" fill="url(#aiGrad)" opacity="0.2"/>
</svg>
