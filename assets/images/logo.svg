<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="456" height="456" viewBox="0 0 456 456" version="1.1" xmlns="http://www.w3.org/2000/svg">
  <!-- Background with rounded corners for logo display -->
  <rect x="0" y="0" width="456" height="456" fill="#000000" rx="80" ry="80"/>
  
  <!-- Definitions for gradients -->
  <defs>
    <linearGradient id="blueGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#60A5FA;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Group centered -->
  <g transform="translate(228, 228)">
    
    <!-- 
      CoHarmony Logo - Hexagon Arrows Only
      Clean, modern design representing harmony and connection
    -->

    <!-- Top Arrow Body (No Tip) -->
    <path d="M -125 -50 
             L -55 -125 
             L 55 -125 
             L 125 -50 
             L 125 50 
             L 35 50 
             L 35 -50 
             L 5 -85 
             L -85 -85 
             L -125 -50 
             Z" 
          fill="url(#blueGradient)" stroke="#60A5FA" stroke-width="2" stroke-linejoin="round"/>

    <!-- Bottom Arrow Body (No Tip) -->
    <path d="M 125 50 
             L 55 125 
             L -55 125 
             L -125 50 
             L -125 -50 
             L -35 -50 
             L -35 50 
             L -5 85 
             L 85 85 
             L 125 50 
             Z" 
          fill="url(#blueGradient)" stroke="#60A5FA" stroke-width="2" stroke-linejoin="round"/>

    <!-- Top Arrow Tip (Higher Layer) -->
    <!-- Overlaps the tail of the Bottom Arrow at the Right side -->
    <path d="M 125 50 
             L 170 50 
             L 80 140 
             L -10 50 
             L 35 50 
             L 125 50 
             Z" 
          fill="url(#blueGradient)" stroke="#60A5FA" stroke-width="2" stroke-linejoin="round"/>

    <!-- Bottom Arrow Tip (Higher Layer) -->
    <!-- Overlaps the tail of the Top Arrow at the Left side -->
    <path d="M -125 -50 
             L -170 -50 
             L -80 -140 
             L 10 -50 
             L -35 -50 
             L -125 -50 
             Z" 
          fill="url(#blueGradient)" stroke="#60A5FA" stroke-width="2" stroke-linejoin="round"/>

  </g>
</svg>
